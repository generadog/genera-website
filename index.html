<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/genera-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genera — Dog Daycare Management Software</title>

    <!-- Webflow base styles (hosted locally to avoid CDN hotlink issues) -->
    <link rel="stylesheet" href="/webflow.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>

    <!-- GSAP core + free plugins from public CDN -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/MotionPathPlugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script>gsap.registerPlugin(MotionPathPlugin, ScrollTrigger);</script>

    <!-- Splide carousel (used by Testimonials section) -->
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1/dist/js/splide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide-extension-auto-scroll@0.5/dist/js/splide-extension-auto-scroll.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (!document.querySelector('.splide')) return;
      const isMobile = window.innerWidth < 768;

      const splide = new Splide('.splide', {
        type: 'loop',
        autoWidth: true,
        pagination: false,
        arrows: false,
        drag: isMobile ? 'free' : false,
        autoScroll: {
          speed: 0.45,
          pauseOnHover: false,
        },
      });

      splide.mount(window.SplideAutoScroll ? { AutoScroll: window.SplideAutoScroll } : {});

      if (isMobile) {
        splide.on('scrolled', function() {
          splide.Components.AutoScroll && splide.Components.AutoScroll.play();
        });
      }
    });
    </script>

    <!-- Set current year on [year] elements -->
    <script>
    document.querySelectorAll('[year]').forEach(el => {
      el.textContent = new Date().getFullYear();
    });
    </script>

    <!-- Dog icon motion-path animation (Integrations section) -->
    <script>
    function initIconPath(desiredCountWeb, desiredCountMobile) {
      const isMobile = window.matchMedia('(max-width: 767px)').matches;
      const pathId = isMobile ? '#icon-path-mobile' : '#icon-path-web';
      const desiredCount = isMobile ? desiredCountMobile : desiredCountWeb;

      let icons = document.querySelectorAll('.icon-item');
      if (!icons.length) return;

      const parent = icons[0].parentNode;
      const originalIcons = Array.from(icons);

      if (originalIcons.length < desiredCount) {
        let i = 0;
        while (parent.querySelectorAll('.icon-item').length < desiredCount) {
          const clone = originalIcons[i % originalIcons.length].cloneNode(true);
          parent.appendChild(clone);
          i++;
        }
      }

      icons = parent.querySelectorAll('.icon-item');
      const tl = gsap.timeline({ repeat: -1 });

      icons.forEach((icon, index) => {
        const start = index / icons.length;
        tl.to(icon, {
          motionPath: {
            path: pathId,
            align: pathId,
            alignOrigin: [0.5, 0.5],
            autoRotate: true,
            start,
            end: start + 1
          },
          ease: 'none',
          duration: 60
        }, 0);
      });
    }

    function initGSAPQuarterlyRefresh() {
      const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
      if (isIOS) return;

      let lastQuarter = -1;
      ScrollTrigger.create({
        trigger: document.body,
        start: 'top top',
        end: 'bottom bottom',
        onUpdate(self) {
          const quarter = Math.floor(self.progress * 4);
          if (quarter !== lastQuarter) {
            ScrollTrigger.refresh();
            lastQuarter = quarter;
          }
        }
      });
    }

    window.addEventListener('load', () => {
      requestAnimationFrame(() => {
        initIconPath(43, 48);
        initGSAPQuarterlyRefresh();
      });
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 991) {
        initIconPath(43, 48);
      }
    });
    </script>

    <!-- Save referral & promo cookies for generasoftware.com -->
    <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const referral = params.get('referral');
      const promoCode = params.get('promo_code');
      const { hostname } = window.location;
      const domain = hostname.includes('generasoftware.com') ? '.generasoftware.com' : hostname;
      const expiry = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toUTCString();

      if (referral) {
        document.cookie = `referral=${encodeURIComponent(referral)};expires=${expiry};path=/;domain=${domain};Secure;`;
      }
      if (promoCode) {
        document.cookie = `promo_code=${encodeURIComponent(promoCode)};expires=${expiry};path=/;domain=${domain};Secure;`;
      }
    })();
    </script>
  </body>
</html>
