<script>
// Function to remove rogue quotes
function removeRogueQuotes() {
  const walker = document.createTreeWalker(
    document.body,
    NodeFilter.SHOW_TEXT,
    {
      acceptNode: (node) => {
        if (node.parentElement?.closest('.page-wrapper')) {
          return NodeFilter.FILTER_REJECT;
        }
        if (/^[""\s]+$/.test(node.textContent)) {
          return NodeFilter.FILTER_ACCEPT;
        }
        return NodeFilter.FILTER_REJECT;
      }
    }
  );

  const nodesToRemove = [];
  while (walker.nextNode()) {
    nodesToRemove.push(walker.currentNode);
  }

  nodesToRemove.forEach(node => node.remove());
}

// Run immediately
removeRogueQuotes();

// Run after DOM is fully loaded
document.addEventListener('DOMContentLoaded', removeRogueQuotes);

// Run after everything including external scripts
window.addEventListener('load', removeRogueQuotes);

// Watch for changes (in case plugin adds them dynamically)
const observer = new MutationObserver(() => {
  removeRogueQuotes();
});

observer.observe(document.body, {
  childList: true,
  subtree: true
});
</script>
<script>
gsap.registerPlugin(ScrollTrigger);

const navbar = document.querySelector('.nav_fixed');

if (navbar && window.matchMedia('(max-width: 991px)').matches) {
  // Create the hide animation (from visible to hidden)
  const hideAnim = gsap.fromTo(navbar, 
    { yPercent: 0 }, 
    { yPercent: -100, duration: 0.5, ease: "power2.inOut", paused: true }
  );
  
  let lastScrollY = 0;
  let ticking = false;
  
  ScrollTrigger.create({
    start: "top top",
    end: "max",
    onUpdate: (self) => {
      const currentScrollY = self.scroll();
      if (!ticking) {
        requestAnimationFrame(() => {
          if (currentScrollY > lastScrollY && currentScrollY > 50) {
            // Scrolling down - hide navbar
            hideAnim.play();
          } else if (currentScrollY < lastScrollY) {
            // Scrolling up - show navbar
            hideAnim.reverse();
          }
          lastScrollY = currentScrollY;
          ticking = false;
        });
        ticking = true;
      }
    }
  });
}
</script>

<script>
function setupButtonAnimations(selector = ".button", targetSelector = null) {
  if (window.matchMedia("(hover: hover)").matches) {
    document.querySelectorAll(selector).forEach(element => {
      const animationTarget = targetSelector ? element.querySelector(targetSelector) : element;
      
      if (animationTarget) {
        const split = new SplitText(animationTarget, {
          struggle: "words,chars"
        });
        const chars = split.chars;
        let waveTimeline;
        
        element.addEventListener("mouseenter", () => {
          if (waveTimeline) waveTimeline.kill();
          waveTimeline = gsap.timeline();
          chars.forEach((char, i) => {
            waveTimeline.to(char, {
              keyframes: [{
                yPercent: -20,
                rotation: -5
              },
              {
                yPercent: 20,
                rotation: 5
              },
              {
                yPercent: 0,
                rotation: 0
              }],
              duration: 1,
              ease: "none",
              yoyo: true
            },
            i * 0.06);
          });
        });
        
        element.addEventListener("mouseleave", () => {
          if (waveTimeline) {
            waveTimeline.kill();
            gsap.to(chars, {
              yPercent: 0,
              rotation: 0,
              duration: 0.2,
              ease: "none"
            });
          }
        });
      }
    });
  }
}

// Usage:
setupButtonAnimations('.button:not([no-animations="true"])'); // Original buttons
setupButtonAnimations('.nav_menu-link'); // navbar links
setupButtonAnimations(".dropdown-link", ".dropdown-link-text"); // Dropdown links
</script>
<script>
  function initCtaDots() {
    const ctaCount    = 100;
    const ctaDuration = 20;
    const pathOpts    = {
      path:        "#curve-cta",
      align:       "#curve-cta",
      alignOrigin: [0.5, 0.5],
    };
    
    const curveElement = document.querySelector("#curve-cta");
    if (!curveElement) {
    	return;
    }

    const svgWrapper = curveElement.closest("svg").parentNode;
    svgWrapper.style.position = "relative";

    for (let i = 0; i < ctaCount; i++) {
      const dot = document.createElement("div");
      dot.classList.add("cta_dot");
      gsap.set(dot, { position: "absolute" });
      svgWrapper.appendChild(dot);

      const tween = gsap.to(dot, {
        duration:        ctaDuration,
        repeat:          -1,
        ease:            "none",
        motionPath:      pathOpts,
        immediateRender: false,
      });
      tween.progress(i / ctaCount);
    }
  }

  // create a GSAP matchMedia instance
  const mm = gsap.matchMedia();

  // add a rule for screens ≥768px
  mm.add("(min-width: 768px)", () => {
    // when this rule first matches, wait for load + a frame then init
    window.addEventListener("load", () => {
      requestAnimationFrame(initCtaDots);
    });

    // return a cleanup function to remove the listener if rule no longer matches
    return () => {
      window.removeEventListener("load", initCtaDots);
    };
  });
</script>

<script>
function setCookie(name, value, daysToExpire, domain) {
  const date = new Date();
  date.setTime(date.getTime() + daysToExpire * 24 * 60 * 60 * 1000);
  const expires = "expires=" + date.toUTCString();
  document.cookie = name + "=" + value + ";" + expires + ";path=/;domain=" + domain + ";secure;samesite=lax";
}

function getQueryParam(name) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}

<script>
document.addEventListener('DOMContentLoaded', function() {
  const canvas = document.querySelector('.mobile-rive canvas');
  
  if (!canvas) return;
  
  // Pick Rive source based on platform
  const riveSrc = window.userPlatform === 'Android'
    ? 'https://cdn.prod.website-files.com/682f84b3838c89f8ff7667db/698649e5101725150367dc74_Chat%20Animation%20-%20Android%20v5.riv'
    : 'https://cdn.prod.website-files.com/682f84b3838c89f8ff7667db/69864656b7cb39c4939a8551_Chat%20Animation%20-%20iOS%20v7.riv';

  let riveInstance = null;
  let hasStarted = false;

  function initializeRive() {
    if (riveInstance) return;
    
    riveInstance = new rive.Rive({
      src: riveSrc,
      canvas: canvas,
      autoplay: false,
      layout: new rive.Layout({
        fit: rive.Fit.Layout,
        alignment: rive.Alignment.Center
      }),
      onLoad: () => {
        riveInstance.resizeDrawingSurfaceToCanvas();
        if (!hasStarted) {
          riveInstance.play();
          hasStarted = true;
        }
      }
    });
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        if (!riveInstance) {
          initializeRive();
        } else if (hasStarted) {
          riveInstance.play(); // Resume where it left off
        }
      } else {
        if (riveInstance && hasStarted) {
          riveInstance.pause(); // Pause but don't reset
        }
      }
    });
  }, { 
    threshold: 0.1,
    rootMargin: '50px'
  });

  observer.observe(canvas);

  window.addEventListener('resize', () => {
    if (riveInstance) {
      riveInstance.resizeDrawingSurfaceToCanvas();
    }
  });

  setTimeout(() => {
    const rect = canvas.getBoundingClientRect();
    const isVisible = rect.top < window.innerHeight && rect.bottom > 0;
    if (isVisible && !hasStarted) {
      initializeRive();
    }
  }, 100);
});
</script>

<script>
  // 0) register all needed plugins up front
  gsap.registerPlugin(
    ScrollTrigger,
    DrawSVGPlugin,
    MotionPathPlugin,
    SplitText
  );

  // 1) Home Features Grid Chips Animation
  function initChipsAnimation() {
	  const triggers = document.querySelectorAll('[data-gsap-trigger="dictionary"]');
	  
	  triggers.forEach((trigger) => {
	    const chips = trigger.querySelectorAll('[data-gsap-target="dictionary-chip"]');
	    
	    gsap.fromTo(
	      chips,
        { x: (i) => `${Math.min(80, 150 / (i + 1))}%` },
	      {
	        x: "0%",
	        ease: "power2.out",
	        stagger: { each: 0.05, from: "end" },
	        scrollTrigger: {
	          trigger: trigger,
	          start: "top bottom",
	          end: "top 10%",
	          scrub: 1.2,
	        },
	      }
	    );
	  });
	}

  // 2) Features section – draws as you scroll
  function initFeaturesDraw() {
    gsap.from(".features_heading-svg path", {
      drawSVG: "0%",
      ease: "none",
      stagger: 0.3,
      scrollTrigger: {
        trigger: ".features_grid-top .features_heading",
        start: "top bottom",
        end: "bottom center",
        scrub: 1.2,
      },
    });
  }

  // 3) Testimonials section – same scrubbed draw
  function initTestimonialsDraw() {
    gsap.from(".testimonials_svg path", {
      drawSVG: "0%",
      ease: "none",
      stagger: 0.3,
      scrollTrigger: {
        trigger: ".testimonials_svg",
        start: "center 100%",
        end: "top top",
        scrub: 1.2,
      },
    });
  }

  // 4) Underline with scroll animation (locks at 100% once complete)
  function initUnderlineDraw() {
    const drawAnim = gsap.from("#heading-underline", { drawSVG: "0%", paused: true });
    let hasCompleted = false;

    ScrollTrigger.create({
      trigger: "#heading-underline",
      start: "top bottom",
      end: "top 30%",
      scrub: false,
      onUpdate: (self) => {
        if (self.direction > 0) {
          drawAnim.progress(self.progress);
          if (self.progress >= 1) hasCompleted = true;
        } else {
          drawAnim.progress(hasCompleted ? 1 : self.progress);
        }
      },
    });
  }


function initMarqueeText() {
  const split = new SplitText(".flag", {
    struggle: "chars",
    absolute: false,
    charsClass: "marquee-char"
  });
  const chars = split.chars;
  const marqueeDuration = 30;
  const basePath = "#curve-flag";
  const baseOpts = {
    path: basePath,
    align: basePath,
    alignOrigin: [0.25, 0.5],
    autoRotate: true
  };
  chars.forEach((char, i) => {
    const start = i / chars.length;
    gsap.to(char, {
      duration: marqueeDuration,
      repeat: -1,
      ease: "none",
      motionPath: {
        ...baseOpts,
        start: start,
        end: start + 1
      }
    });
  });
}

function initIconPath(desiredCountWeb, desiredCountMobile) {
  const isMobile = window.matchMedia('(max-width: 767px)').matches;
  const pathId = isMobile ? '#icon-path-mobile' : '#icon-path-web';
  const desiredCount = isMobile ? desiredCountMobile : desiredCountWeb;

  let icons = document.querySelectorAll('.icon-item');
  if (!icons.length) return;

  const parent = icons[0].parentNode;
  const originalIcons = Array.from(icons);

  if (originalIcons.length < desiredCount) {
    let i = 0;
    while (parent.querySelectorAll('.icon-item').length < desiredCount) {
      const clone = originalIcons[i % originalIcons.length].cloneNode(true);
      parent.appendChild(clone);
      i++;
    }
  }

  icons = parent.querySelectorAll('.icon-item');
  const tl = gsap.timeline({ repeat: -1 });

  icons.forEach((icon, index) => {
    const start = index / icons.length;
    tl.to(icon, {
      motionPath: {
        path: pathId,
        align: pathId,
        alignOrigin: [0.5, 0.5],
        autoRotate: true,
        start,
        end: start + 1
      },
      ease: 'none',
      duration: 60
    }, 0);
  });
}


function initGSAPQuarterlyRefresh() {
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
  if (isIOS) return;

  let lastQuarter = -1;
  ScrollTrigger.create({
    trigger: document.body,
    start: "top top",
    end: "bottom bottom",
    onUpdate(self) {
      const quarter = Math.floor(self.progress * 4);
      if (quarter !== lastQuarter) {
        ScrollTrigger.refresh();
        lastQuarter = quarter;
      }
    }
  });
}


// call once after ScrollTrigger and gsap are registered
initGSAPQuarterlyRefresh();

  // combine and run them all after full load + layout
  function initAllAnimations() {
    initChipsAnimation();
    initFeaturesDraw();
    initTestimonialsDraw();
    initUnderlineDraw();
    initMarqueeText();
    initIconPath(43, 48);
    initGSAPQuarterlyRefresh();
  }

  window.addEventListener("load", () => {
    // wait one frame so CSS and SVG layout settle
    requestAnimationFrame(initAllAnimations);
  });
  
  window.addEventListener("resize", () => {
  if (window.innerWidth > 991) {
   initIconPath(43, 48);
  }
});
</script>
